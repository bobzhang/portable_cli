name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: MoonBit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          moon version --all
          command -v moonrun

      - name: Update dependencies
        run: moon update

      - name: Check
        run: moon check

      - name: Check Wasm target
        run: moon check --target wasm

      - name: Test Wasm target
        run: moon test --target wasm

      - name: Run cram tests
        run: moon cram test tests/cram
